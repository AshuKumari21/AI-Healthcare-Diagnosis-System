services:
  # Option 1: Unified Service (Recommended - Runs both Frontend & Backend)
  - type: web
    name: healthcare-unified
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn run_prod:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false

  # Option 2: ML Backend (FastAPI) - Separate
  - type: web
    name: healthcare-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .

  # Option 3: Frontend Dashboard (Dash) - Separate
  - type: web
    name: healthcare-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: API_BASE_URL
        fromService:
          name: healthcare-api
          type: web
          property: url
